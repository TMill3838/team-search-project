<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Shortcut Finder</title>
    <link rel="stylesheet" href="styles/retro-style.css">
</head>
<body>
    <header>
        <h1> KEYBOARD SHORTCUTS</h1>
        <p>A project by Isabella, Tylan & Nang</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search by name or shortcut...">
        <button id="searchButton">Go</button>

        <select id="toolFilter">
            <option value="all">All Tools</option>
            <option value="author">Author</option>
            <option value="shortcut">Shortcut</option>
        </select>

        <select id="sortSelect">
            <option value="">-- Sort By --</option>
            <option value="author">Author Name (A-Z)</option>
            <option value="shortcut">Shortcut (A-Z)</option>
        </select>
    </div>

    <main id="shortcutList" class="grid-container"></main>
    <p id="searchMessage"></p>

    <script type="module" src="scripts/data.js"></script>
    <script type="module" src="scripts/search.js"></script>
    <script type="module" src="scripts/sort.js"></script>
</body>
</html>
